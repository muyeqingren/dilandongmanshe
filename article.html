<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>公告详情 - 迪兰动漫社</title>
    <link rel="stylesheet" href="style.css">
    <script src="database.js"></script>
</head>
<body>

<header>
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <nav>
        <ul>
            <li><a href="index.html#home"><span class="en">INDEX</span><span class="cn">首页</span></a></li>
            <li class="active"><a href="index.html#info"><span class="en">INFO</span><span class="cn">情报</span></a></li>
            <li><a href="index.html#dept"><span class="en">DEPT</span><span class="cn">部门</span></a></li>
            <li><a href="index.html#world"><span class="en">WORLD</span><span class="cn">设定</span></a></li>
            <li><a href="index.html#stage"><span class="en">STAGE</span><span class="cn">招募</span></a></li>
        </ul>
    </nav>
</header>

<div class="article-page">
    <div class="article-container">
        <div class="article-header">
            <h1 class="article-title" id="art-title">正在读取情报...</h1>
            <div class="article-meta">
                <span id="art-date"></span>
                <span id="art-type"></span>
            </div>
        </div>

        <div class="article-content" id="art-content">
        </div>

        <div class="back-btn-container">
            <a href="index.html#info" class="back-btn">&lt; 返回情报列表</a>
        </div>
    </div>
</div>

<script>
    // 1. 获取 URL 中的 id
    const urlParams = new URLSearchParams(window.location.search);
    const id = parseInt(urlParams.get('id'));

    // 【优化2】增加安全检查：确保 database.js 里的 notices 数组存在
    if (typeof notices !== 'undefined') {
        // 2. 查找数据
        const data = notices.find(item => item.id === id);

        // 3. 填充页面
        if (data) {
            document.title = data.title + " - 迪兰动漫社";
            document.getElementById('art-title').innerText = data.title;
            document.getElementById('art-date').innerText = "发布时间：" + data.date;
            document.getElementById('art-type').innerText = "# " + data.type; // 加个井号装饰一下
            document.getElementById('art-content').innerHTML = data.content;
        } else {
            // 【优化3】更友好的 404 提示
            document.getElementById('art-title').innerText = "404 DATA NOT FOUND";
            document.getElementById('art-content').innerHTML = `
                <div style="text-align:center; padding:50px 0; color:#999;">
                    <p>抱歉，未找到该档案。</p>
                    <p>可能已被删除或权限不足。</p>
                </div>
            `;
            // 隐藏日期和类型，因为没有数据
            document.getElementById('art-date').style.display = 'none';
            document.getElementById('art-type').style.display = 'none';
        }
    } else {
        // 如果 database.js 没加载出来的备用方案
        document.getElementById('art-title').innerText = "系统错误";
        document.getElementById('art-content').innerHTML = "<p>无法读取数据库，请检查网络或 database.js 文件。</p>";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>公告详情 - 迪兰动漫社</title>
    <link rel="stylesheet" href="style.css">
    <script src="database.js"></script>
</head>
<body>
<header>
    <div class="logo"><img src="images/logo.png" alt="Logo"></div>
    <nav>
        <ul>
            <li><a href="index.html#home"><span class="en">INDEX</span><span class="cn">首页</span></a></li>
            <li class="active"><a href="index.html#info"><span class="en">INFORMATION</span><span class="cn">情报</span></a></li>
            <li><a href="index.html#dept"><span class="en">DEPARTMENT</span><span class="cn">部门</span></a></li>
            <li><a href="index.html#world"><span class="en">WORLD</span><span class="cn">设定</span></a></li>
            <li><a href="index.html#stage"><span class="en">STAGE</span><span class="cn">舞台剧</span></a></li>
        </ul>
    </nav>
</header>

<div class="article-page">
    <div class="article-container">
        <div class="article-header">
            <h1 class="article-title" id="art-title">正在加载...</h1>
            <div class="article-meta">
                <span id="art-date"></span>
                <span id="art-type"></span>
            </div>
        </div>

        <div class="article-content" id="art-content">
        </div>

        <div class="back-btn-container">
            <a href="index.html#info" class="back-btn">< 返回情报列表</a>
        </div>
    </div>
</div>

<script>
    // 1. 拿到网址上的 id，例如 article.html?id=4
    const urlParams = new URLSearchParams(window.location.search);
    const id = parseInt(urlParams.get('id'));

    // 2. 去 database.js 的数组里找这个 id 的数据
    const data = notices.find(item => item.id === id);

    // 3. 填充到页面上
    if (data) {
        document.title = data.title + " - 迪兰动漫社"; // 修改浏览器标签页标题
        document.getElementById('art-title').innerText = data.title;
        document.getElementById('art-date').innerText = "发布时间：" + data.date;
        document.getElementById('art-type').innerText = "分类：" + data.type;
        document.getElementById('art-content').innerHTML = data.content;
    } else {
        document.getElementById('art-content').innerHTML = "<p style='text-align:center; padding:50px;'>抱歉，未找到该公告，可能已被删除。</p>";
        document.getElementById('art-title').innerText = "404 Not Found";
    }
</script>
</body>
</html>
